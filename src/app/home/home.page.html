<ion-header>
  <ion-toolbar>
    <ion-title>RegistrAPP</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content padding>
  <ion-card>
    <ion-card-header>
      <ion-card-title class="centered">Bienvenido a RegistrAPP</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <!-- Imagen centrada -->
      <img class="centered-img" 
           src="https://t3.ftcdn.net/jpg/03/68/95/08/360_F_368950850_aMW6C9P5SV7udFGHWgz97fvgNVsnOvpp.jpg"
           alt="Educación en Continuidad" />
           <br>
      <img src="https://www.duoc.cl/wp-content/uploads/2020/06/valparaiso_IMG_0313_1920.jpg" 
           alt="Foto sede" />

      <!-- Contenedor de la galería de imágenes -->
      <div class="image-gallery">
        <div class="image-container" *ngFor="let image of images">
          <img [src]="image.url" 
               [alt]="image.alt" 
               class="gallery-img"
               (click)="navigateToPage(image.alt)"
               style="cursor: pointer">
        </div>
      </div>

      <!-- Botón para desplegar funcionalidades -->
      <ion-button expand="full" (click)="toggleFunctionality()">
        Mostrar/Ocultar Funcionalidades
      </ion-button>

      <!-- Lista de funcionalidades con visibilidad controlada -->
      <ion-list *ngIf="showFunctionality">
        <ion-list-header>
          <ion-label>Funcionalidades:</ion-label>
        </ion-list-header>
        <ion-item>
          <ion-icon name="qr-code-outline" slot="start"></ion-icon>
          <ion-label>Registro de asistencia mediante código QR</ion-label>
        </ion-item>
        <ion-item>
          <ion-icon name="camera-outline" slot="start"></ion-icon>
          <ion-label>Lectura del código QR con la cámara del dispositivo</ion-label>
        </ion-item>
        <ion-item>
          <ion-icon name="calendar-outline" slot="start"></ion-icon>
          <ion-label>Registro automático con fecha y hora</ion-label>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title>¿Cómo funciona?</ion-card-title>
    </ion-card-header>
    <ion-card-content>
       
      
    </ion-card-content>
  </ion-card>
</ion-content>
